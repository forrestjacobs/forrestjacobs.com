{{- $height := strings.Count "\n" .Inner | add 1 | mul 1.421875 }}
<figure class="codeblock{{with .Attributes.wide}} wide{{end}}">
{{- with .Attributes.name }}
<figcaption class="name">{{ . }}</figcaption>
{{- end }}
{{- with .Attributes.title }}
<figcaption>{{ . }}</figcaption>
{{- end }}
<div style="height: {{ div $height 1.625 | math.Ceil | add 1 | mul 1.625 }}rem;">
<pre
    role="document" tabindex="0"{{if transform.CanHighlight .Type}} class="chroma"{{end}}
    style="line-height: 1.421875rem;height: {{ add $height 0.8125 }}rem;"
>
{{- if transform.CanHighlight .Type }}
<code class="language-{{ .Type }}">
{{- with transform.HighlightCodeBlock . -}}
{{ .Inner }}
{{- end -}}
</code>
{{- else }}
<code>{{ .Inner }}</code>
{{- end }}</pre>
</div>
</figure>
